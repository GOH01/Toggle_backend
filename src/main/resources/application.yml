jwt:
  issuer: toggle
  secret: change-me-in-local-dev-change-me-in-local-dev
  access-token-expiration-seconds: 3600
  refresh-token-expiration-seconds: 1209600

spring:
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB
  datasource:
    url: jdbc:h2:mem:toggle;MODE=MySQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
  h2:
    console:
      enabled: false

cloud:
  aws:
    credentials:
      access-key: change-me-in-local-dev
      secret-key: change-me-in-local-dev
    region: ap-northeast-2
    s3:
      bucket: toggle-local-bucket

app:
  national-tax:
    service-key:
    base-url: https://api.odcloud.kr/api/nts-businessman/v1
  kakao:
    api-key: change-me-in-local-dev
    base-url: https://dapi.kakao.com
