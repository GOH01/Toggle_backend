spring:
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB
  datasource:
    url: jdbc:h2:mem:toggle;MODE=MySQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: create-drop
    open-in-view: false
  sql:
    init:
      mode: never

jwt:
  issuer: toggle-test
  secret: test-secret-key-for-jwt-signing-1234567890
  access-token-expiration-seconds: 3600
  refresh-token-expiration-seconds: 1209600

app:
  owner-documents:
    upload-dir: ${java.io.tmpdir}/toggle-owner-documents-test
  national-tax:
    service-key: test-national-tax-service-key
    base-url: https://api.odcloud.kr/api/nts-businessman/v1
  kakao:
    api-key: test-kakao-api-key
    base-url: https://dapi.kakao.com
